<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变定义 - 橙色系 -->
  <defs>
    <linearGradient id="luminaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9f43;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>

    <!-- 光芒滤镜 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 外圈光芒 -->
  <circle cx="32" cy="32" r="28" fill="url(#luminaGradient)" opacity="0.1"/>

  <!-- 主星星 -->
  <path d="M32 8 L36 24 L52 24 L39 34 L44 50 L32 40 L20 50 L25 34 L12 24 L28 24 Z"
        fill="url(#luminaGradient)"
        filter="url(#glow)"/>

  <!-- 小星星装饰 -->
  <circle cx="48" cy="16" r="2" fill="#ff9f43" opacity="0.8"/>
  <circle cx="16" cy="16" r="1.5" fill="#ff6b6b" opacity="0.8"/>
  <circle cx="52" cy="48" r="1.5" fill="#ff9f43" opacity="0.8"/>
  <circle cx="12" cy="48" r="2" fill="#ff6b6b" opacity="0.8"/>

  <!-- 中心光点 -->
  <circle cx="32" cy="32" r="4" fill="white" opacity="0.9"/>
</svg>
